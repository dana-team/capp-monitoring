{{- if .Values.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-benchmarks
  labels: {{ include "benchmarks.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-benchmarks
  labels: {{ include "benchmarks.labels" . | nindent 4 }}
rules:
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-benchmarks
  labels: {{ include "benchmarks.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-benchmarks
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-benchmarks
    namespace: {{ .Release.Namespace }}
{{- end }}
