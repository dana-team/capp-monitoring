{{- if .Values.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-benchmark-k6
  labels: {{ include "benchmarks.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule.k6 | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels: {{ include "benchmarks.labels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ .Release.Name }}-benchmarks
          restartPolicy: OnFailure
          containers:
            - name: k6
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env: {{ include "benchmarks.envVars" . | nindent 16 }}
              command:
                - /bin/bash
                - -c
                - |
                  echo "==> Running cold-start test..."
                  bash /scripts/cold-start.sh
                  echo "==> Running latency test..."
                  {{- if .Values.prometheus.remoteWriteUrl }}
                  k6 run --out experimental-prometheus-rw /scripts/latency.js
                  {{- else }}
                  k6 run /scripts/latency.js
                  {{- end }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: scripts
              configMap:
                name: {{ .Release.Name }}-benchmark-scripts
                defaultMode: 0755
{{- end }}
