{{- if .Values.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "status-page.fullname" . }}
  labels: {{ include "status-page.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "status-page.fullname" . }}
  labels: {{ include "status-page.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "status-page.fullname" . }}
  labels: {{ include "status-page.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "status-page.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "status-page.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
