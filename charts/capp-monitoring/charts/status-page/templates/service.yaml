{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "status-page.fullname" . }}
  labels: {{ include "status-page.labels" . | nindent 4 }}
spec:
  selector: {{ include "status-page.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
{{- end }}
