# CI: Test workflow
# Runs on every push and pull request. Performs static analysis, unit tests,
# and Helm chart linting. No cluster is required.
name: Test

on:
  push:
    branches: ["main"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "charts/**"
      - ".github/workflows/test.yaml"
  pull_request:
    branches: ["main"]
  workflow_call:

permissions:
  contents: read

jobs:
  # ── Go: lint + test ──────────────────────────────────────────────────────────
  go:
    name: Go lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Unit tests (with race detector)
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Go: build check ──────────────────────────────────────────────────────────
  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/status-server/...

  # ── Helm: lint ───────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Build chart dependencies
        run: helm dependency build charts/capp-monitoring

      - name: Lint chart
        run: |
          helm lint charts/capp-monitoring \
            --set benchmarks.targetUrl=http://example.com \
            --set benchmarks.knativeService=test-svc

      - name: Template chart
        run: |
          helm template capp-monitoring charts/capp-monitoring \
            --set benchmarks.targetUrl=http://example.com \
            --set benchmarks.knativeService=test-svc \
            > /dev/null

  # ── Docker: build check (no push) ────────────────────────────────────────────
  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build status-server image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.status-server
          push: false
          tags: ghcr.io/dana-team/capp-status-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build benchmark-runner image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: ghcr.io/dana-team/capp-benchmark-runner:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
